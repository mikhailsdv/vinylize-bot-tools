<!doctype html>
<html lang="ru">
<head>
	<meta charset="utf-8">
	<meta name="viewport" content="width=device-width, initial-scale=1">
	<title>Инструменты для Винилизатора</title>
	<style>
		* {
			box-sizing: border-box;
		}

		body {
			margin: 0;
			min-height: 100vh;
			display: flex;
			align-items: center;
			justify-content: center;
			background: #f5f6fa;
			color: #171717;
			font-family: system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
			line-height: 1.5;
		}

		main {
			width: 100%;
			max-width: 520px;
			padding: 24px;
		}

		.card {
			width: 100%;
			padding: 28px 20px;
			border-radius: 24px;
			background: #ffffff;
			box-shadow: 0 20px 60px rgba(15, 23, 42, 0.08);
		}

		h1 {
			margin: 0 0 12px;
			font-size: 28px;
			line-height: 1.15;
			text-align: center;
		}

		.description {
			margin: 0 0 24px;
			color: #6b7280;
			text-align: center;
		}

		.tools {
			display: flex;
			flex-direction: column;
			gap: 12px;
			margin: 0;
			padding: 0;
			list-style: none;
		}

		a {
			display: block;
			padding: 16px;
			border: 1px solid #d7dbe5;
			border-radius: 16px;
			color: #171717;
			text-decoration: none;
			transition: border-color 0.2s, box-shadow 0.2s, transform 0.2s;
		}

		a:focus,
		a:hover {
			border-color: #5f65ff;
			box-shadow: 0 0 0 4px rgba(95, 101, 255, 0.12);
			outline: none;
		}

		a:active {
			transform: translateY(1px);
		}

		.tool-title {
			display: block;
			margin-bottom: 4px;
			font-weight: 700;
		}

		.tool-description {
			display: block;
			color: #6b7280;
			font-size: 14px;
		}
	</style>
</head>
<body>
	<main>
		<section class="card">
			<h1>Инструменты для Винилизатора</h1>
			<p class="description">Полезные инструменты для работы с @VinylizeBot в Telegram.</p>

			<nav aria-label="Список инструментов">
				<ul class="tools">
					<li>
						<a href="utm-link-generator.html">
							<span class="tool-title">Генератор UTM ссылок</span>
							<span class="tool-description">Создать ссылку на бота с utm_source, utm_medium и utm_campaign.</span>
						</a>
					</li>
					<li>
						<a href="text-brandbook-formatter.html">
							<span class="tool-title">Форматтер текста по брендбуку</span>
							<span class="tool-description">Привести текст к правилам оформления для Telegram и Instagram.</span>
						</a>
					</li>
				</ul>
			</nav>
		</section>
	</main>
</body>
</html>
